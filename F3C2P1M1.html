<script>

function calculerLigne(element){

let row = element.parentElement.parentElement;

let debit =
parseFloat(
row.cells[1]
.querySelector('input')
.value
) || 0;

let credit =
parseFloat(
row.cells[2]
.querySelector('input')
.value
) || 0;

let soldeDebit = 0;
let soldeCredit = 0;

if(debit > credit){

    soldeDebit = debit - credit;

}
else if(credit > debit){

    soldeCredit = credit - debit;

}

row.cells[3]
.querySelector('input')
.value = soldeDebit;

row.cells[4]
.querySelector('input')
.value = soldeCredit;

calculerTotaux();

}

function calculerTotaux(){

let rows =
document.querySelectorAll("#tbody tr");

let totalDebit = 0;
let totalCredit = 0;
let totalSoldeDebit = 0;
let totalSoldeCredit = 0;

rows.forEach(row => {

    totalDebit +=
    parseFloat(
    row.cells[1]
    .querySelector('input')
    .value
    ) || 0;

    totalCredit +=
    parseFloat(
    row.cells[2]
    .querySelector('input')
    .value
    ) || 0;

    totalSoldeDebit +=
    parseFloat(
    row.cells[3]
    .querySelector('input')
    .value
    ) || 0;

    totalSoldeCredit +=
    parseFloat(
    row.cells[4]
    .querySelector('input')
    .value
    ) || 0;

});

document.getElementById("totalDebit")
.innerText =
totalDebit.toLocaleString('fr-FR');

document.getElementById("totalCredit")
.innerText =
totalCredit.toLocaleString('fr-FR');

document.getElementById("totalSoldeDebit")
.innerText =
totalSoldeDebit.toLocaleString('fr-FR');

document.getElementById("totalSoldeCredit")
.innerText =
totalSoldeCredit.toLocaleString('fr-FR');

}

function enregistrerBalance(){

let table =
document.getElementById("balanceTable");

let clone =
table.cloneNode(true);

/* Récupération des vraies valeurs */

let vraisSelects =
document.querySelectorAll("#balanceTable select");

let fauxSelects =
clone.querySelectorAll("select");

fauxSelects.forEach((selectClone,index)=>{

    let valeur =
    vraisSelects[index]
    .options[
    vraisSelects[index].selectedIndex
    ].text;

    let td =
    selectClone.parentElement;

    td.innerHTML = valeur;

});

/* Récupération des vraies valeurs INPUT */

let vraisInputs =
document.querySelectorAll("#balanceTable input");

let fauxInputs =
clone.querySelectorAll("input");

fauxInputs.forEach((inputClone,index)=>{

    let valeur =
    vraisInputs[index].value;

    let td =
    inputClone.parentElement;

    td.innerHTML = valeur;

});

/* Supprimer les boutons */

clone.querySelectorAll("button")
.forEach(btn=>{

    btn.remove();

});

/* Création du document HTML propre */

let contenu = `

<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Balance Comptable</title>

<style>

body{
    font-family:Arial;
    margin:20px;
}

h1{
    text-align:center;
    color:#2c3e50;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2c3e50;
    color:white;
    padding:10px;
    border:1px solid #000;
}

td{
    border:1px solid #000;
    padding:8px;
}

.total-row{
    background:#ecf0f1;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Balance des Comptes</h1>

${clone.outerHTML}

</body>

</html>

`;

let blob =
new Blob(
[contenu],
{type:"text/html"}
);

let lien =
document.createElement("a");

let nom =
prompt(
"Nom du fichier :",
"Balance_Comptable"
);

if(nom == null || nom == "") return;

lien.href =
URL.createObjectURL(blob);

lien.download =
nom + ".html";

lien.click();

}

window.onload = function(){

document
.querySelectorAll("input")
.forEach(input => {

    calculerLigne(input);

});

}
