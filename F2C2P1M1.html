<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau Compte avec Solde</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background-color: #f8fafc;
  text-align: center;
}

table {
  width: 80%;
  margin: 0 auto;
  border-collapse: collapse;
  margin-bottom: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

th {
  background-color: #ffd700;
}

.compte-titre {
  background-color: #ffccd9;
  font-weight: bold;
}

.debit { background-color: #ccffcc; }
.credit { background-color: #fff5b1; }

.total {
  font-weight: bold;
  background-color: #e0e0e0;
}

input {
  width: 90%;
  font-weight: bold;
  text-align: center;
}

button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
  font-weight: bold;
}

.btn-ajout { background:#28a745; color:white; border:none; }
.btn-supp { background:#dc3545; color:white; border:none; }
.btn-vider { background:#6c757d; color:white; border:none; }
.btn-save { background:#007bff; color:white; border:none; }

</style>
</head>

<body>

<h2>Tableau Compte-IgnDay-</h2>

<div id="tableauxContainer">

<div class="compte-section">

<table>

<thead>

<tr class="compte-titre">
<td colspan="3">
<input type="text" placeholder="Saisir N° et Intitulé Compte">
</td>
</tr>

<tr>
<th>Débit</th>
<th>Crédit</th>
<th>Action</th>
</tr>

</thead>

<tbody>
<tr>
<td class="debit"><input type="number" oninput="calculer(this)"></td>
<td class="credit"><input type="number" oninput="calculer(this)"></td>
<td><button onclick="supprimerLigne(this)">❌</button></td>
</tr>
</tbody>

<tfoot>
<tr class="total">
<td class="solde-debit"></td>
<td class="solde-credit"></td>
<td>Solde</td>
</tr>

<tr class="total">
<td class="total-debit">0</td>
<td class="total-credit">0</td>
<td>Total</td>
</tr>
</tfoot>

</table>

<button onclick="ajouterLigne(this)">➕ Ligne</button>

<button class="btn-supp" onclick="supprimerCompte(this)">🗑️ Compte</button>

<button class="btn-vider" onclick="viderCompte(this)">🧹 Vider</button>

</div>

</div>

<br>

<button class="btn-ajout" onclick="ajouterCompte()">➕ Ajouter compte</button>

<button class="btn-save" onclick="enregistrer()">💾 Enregistrer fichier</button>

<script>

/* ================= CALCUL ================= */

function calculer(input){

  const table = input.closest('table');

  const rows = table.querySelectorAll('tbody tr');

  let debit = 0;
  let credit = 0;

  rows.forEach(r=>{

    debit += parseFloat(r.children[0].querySelector('input').value)||0;
    credit += parseFloat(r.children[1].querySelector('input').value)||0;

  });

  let sd="", sc="";

  if(debit > credit) sc = debit - credit;
  else if(credit > debit) sd = credit - debit;

  table.querySelector('.total-debit').innerText = debit.toFixed(2);
  table.querySelector('.total-credit').innerText = credit.toFixed(2);

  table.querySelector('.solde-debit').innerText = sd;
  table.querySelector('.solde-credit').innerText = sc;
}

/* ================= LIGNE ================= */

function ajouterLigne(btn){

  const tbody = btn.closest('.compte-section').querySelector('tbody');

  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td class="debit"><input type="number" oninput="calculer(this)"></td>
    <td class="credit"><input type="number" oninput="calculer(this)"></td>
    <td><button onclick="supprimerLigne(this)">❌</button></td>
  `;

  tbody.appendChild(tr);
}

function supprimerLigne(btn){
  btn.closest('tr').remove();
  calculer(btn);
}

/* ================= COMPTE ================= */

function ajouterCompte(){

  const container = document.getElementById('tableauxContainer');

  const div = document.createElement('div');
  div.className = "compte-section";

  div.innerHTML = `
  <table>

  <thead>
  <tr class="compte-titre">
  <td colspan="3">
  <input type="text" placeholder="Nouveau compte">
  </td>
  </tr>

  <tr>
  <th>Débit</th>
  <th>Crédit</th>
  <th>Action</th>
  </tr>
  </thead>

  <tbody>
  <tr>
  <td class="debit"><input type="number" oninput="calculer(this)"></td>
  <td class="credit"><input type="number" oninput="calculer(this)"></td>
  <td><button onclick="supprimerLigne(this)">❌</button></td>
  </tr>
  </tbody>

  <tfoot>
  <tr class="total">
  <td class="solde-debit"></td>
  <td class="solde-credit"></td>
  <td>Solde</td>
  </tr>

  <tr class="total">
  <td class="total-debit">0</td>
  <td class="total-credit">0</td>
  <td>Total</td>
  </tr>
  </tfoot>

  </table>

  <button onclick="ajouterLigne(this)">➕ Ligne</button>
  <button class="btn-supp" onclick="supprimerCompte(this)">🗑️ Compte</button>
  <button class="btn-vider" onclick="viderCompte(this)">🧹 Vider</button>
  `;

  container.appendChild(div);
}

/* ================= SUPPRIMER COMPTE ================= */

function supprimerCompte(btn){
  if(confirm("Supprimer ce compte ?")){
    btn.closest('.compte-section').remove();
  }
}

/* ================= VIDER COMPTE ================= */

function viderCompte(btn){

  const section = btn.closest('.compte-section');

  section.querySelectorAll('input').forEach(i=>i.value='');

  section.querySelectorAll('.total-debit,.total-credit,.solde-debit,.solde-credit')
  .forEach(e=>e.innerText='');
}

/* ================= ENREGISTREMENT FIXE ================= */

function enregistrer(){

  let nom = prompt("Nom du fichier :", "Comptes");
  if(!nom) return;

  const clone = document.documentElement.cloneNode(true);

  // 🔥 IMPORTANT : transformer inputs en valeurs visibles
  clone.querySelectorAll('input').forEach(input => {

    const span = document.createElement("span");
    span.textContent = input.value;
    input.parentNode.replaceChild(span, input);

  });

  const html = "<!DOCTYPE html>\n" + clone.outerHTML;

  const blob = new Blob([html], {type:"text/html"});

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = nom + ".html";
  a.click();
}

</script>
<footer>
    Formation en comptabilité générale
<br>

<a href="C2P1M1.html">⬅ Retour </a>

</footer>

</body>
</html>
