<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bilan Interactif</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f4f6f9;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

/* ================= BOUTONS ================= */

.top-actions{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.top-btn{
    padding:10px 18px;
    font-size:15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    color:white;
}

.btn-clear{
    background:#c0392b;
}

.btn-excel{
    background:#2980b9;
}

.btn-save{
    background:#27ae60;
}

/* ================= TABLES ================= */

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    align-items:stretch;
}

.table-zone{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
}

table{
    width:100%;
    border-collapse:collapse;
    height:100%;
}

tfoot{
    margin-top:auto;
}

th{
    background:#2c3e50;
    color:white;
    padding:12px;
    border:1px solid #999;
    font-size:24px;
}

td{
    border:1px solid #bbb;
    padding:6px;
    vertical-align:top;
}

/* RUBRIQUES PRINCIPALES */

.rubrique-principale{
    background:#d6eaf8;
    font-weight:bold;
    font-size:20px;
}

/* RUBRIQUES 2 CHIFFRES */

.rubrique-2{
    background:#ebf5fb;
    font-weight:bold;
    font-size:17px;
}

/* POSTES */

.poste-row{
    background:#fafafa;
}

select,
input{
    width:100%;
    padding:6px;
    border:1px solid #999;
    border-radius:4px;
}

.actions{
    margin-top:5px;
}

button{
    border:none;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.add{
    background:#27ae60;
    color:white;
}

.delete{
    background:#c0392b;
    color:white;
}

/* TOTALS */

.total{
    background:#2c3e50;
    color:white;
    font-weight:bold;
    font-size:22px;
    height:65px;
}

.total td{
    padding:12px;
    vertical-align:middle;
}

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>Bilan INTERACTIF-IgnDay-</h1>

<!-- ================= BOUTONS ================= -->

<div class="top-actions">

<button class="top-btn btn-clear"
onclick="viderChamps()">
Vider le tableau
</button>

<button class="top-btn btn-excel"
onclick="exportExcel()">
Export Excel
</button>

<button class="top-btn btn-save"
onclick="enregistrerBilan()">
Enregistrer Bilan
</button>

</div>

<div class="container">

<!-- ================= ACTIF ================= -->

<div class="table-zone">

<table id="tableActif">

<thead>

<tr>
<th>ACTIF</th>
<th>Montant</th>
</tr>

</thead>

<tbody id="actifBody"></tbody>

<tfoot>

<tr class="total">
<td>Total Actif</td>
<td id="totalActif">0,00</td>
</tr>

</tfoot>

</table>

</div>

<!-- ================= PASSIF ================= -->

<div class="table-zone">

<table id="tablePassif">

<thead>

<tr>
<th>PASSIF</th>
<th>Montant</th>
</tr>

</thead>

<tbody id="passifBody"></tbody>

<tfoot>

<tr class="total">
<td>Total Passif</td>
<td id="totalPassif">0,00</td>
</tr>

</tfoot>

</table>

</div>

</div>

<script>

/* ======================================================
ACTIF
====================================================== */

const actifData = [

{
principal:"2 Actif immobilisé",

rubriques:[

{
rubrique:"21 Immobilisations en non-valeurs",

"211 Frais Préliminaires",

]
},

{
rubrique:"22 Immobilisations Incorporelles",

postes:[
"221 Immobilisations en recherche et Développement",
"222 Brevets, marques, droits et valeurs similaires",
"223 Fonds Commercial",
"228 Autres immobilisations Incorporelles"
]
},

{
rubrique:"23 Immobilisations Corporelles",

postes:[
"231 Terrains",
"232 Constructions",
"233 Installations Techniques, matériel et outillage",
"234 Matériel de transport",
"235 Mobilier, matériel de bureau et aménagements divers",
"238 Autres immobilisations corporelles",
"239 Immobilisations corporelles en cours"


]
}

]

},

{
principal:"3 Actif Circulant",

rubriques:[

{
rubrique:"31 Stocks",

postes:[
"311 Marchandises",
"312 Matières et fournitures consommables",
"313 Produits en cours",
"315 Produits finis"
]
},

{
rubrique:"34 Créances de l'actif circulant",

postes:[
"341 Fournisseurs débiteurs",

"343 Personnel débiteur",
"345 Etat débiteur"
]
}

]

},

{
principal:"5 Trésorerie",

{

postes:[
"511 Chèques et valeurs à encaisser",

]
}

}

];

/* ======================================================
PASSIF
====================================================== */

const passifData = [

{
principal:"1 Financement Permanent",

rubriques:[

{
rubrique:"11 Capitaux propres",

postes:[
"111 Capital social ou personnel",
"112 Primes d’émission",
"113 Ecarts de réévaluation",
"114 Réserve légale",
"115 Autres réserves",
"116 Report à nouveau",
"118 Résultat net en Instance d'Affectation",
"119 Résultat net de l'exercice"
]
},

{
rubrique:"14 Dettes de Financement",

postes:[
"141 Emprunts Obligataires",
"148 Autres dettes de Financement"
]
}

]

},

{
principal:"4 Passif circulant",

rubriques:[

{
rubrique:"44 Dettes du passif circulant",

postes:[
"441 Fournisseurs et comptes rattachés",
"442 Clients créditeurs",
"443 Personnel - créditeur",
"444 Organismes sociaux",
"445 Etat - créditeur",
"446 Comptes d'associés - créditeurs",
"448 Autres créanciers",
"449 Comptes de régularisation - passif"
]
}

]

},

{
principal:"5 Trésorerie",

rubriques:[

{
rubrique:"55 Trésorerie - Passif",

postes:[
"552 Crédits d'escompte",
"553 Crédits de trésorerie",
"554 Banques créditeurs"
]
}

]

}

];

/* ======================================================
CREATION TABLE
====================================================== */

function createTable(data, bodyId){

const body = document.getElementById(bodyId);

data.forEach(section=>{

const principalRow = document.createElement("tr");

principalRow.innerHTML = `
<td class="rubrique-principale">
> ${section.principal}
</td>
<td class="rubrique-principale"></td>
`;

body.appendChild(principalRow);

section.rubriques.forEach((rub,index)=>{

const rubRow = document.createElement("tr");

rubRow.className = "rubrique-2";

rubRow.dataset.group =
bodyId + "_" + section.principal + "_" + index;

rubRow.innerHTML = `

<td>

>> ${rub.rubrique}

<div class="actions">

<button class="add add-poste-btn">
+ Ajouter Poste
</button>

</div>

</td>

<td></td>

`;

body.appendChild(rubRow);

rubRow.querySelector(".add-poste-btn")
.addEventListener("click", function(){

addPoste(this, rub.postes);

});

});

});

}

/* ======================================================
AJOUT POSTE
====================================================== */

function addPoste(button, postes){

const rubriqueRow = button.closest("tr");

const groupId = rubriqueRow.dataset.group;

const row = document.createElement("tr");

row.className = "poste-row";

row.dataset.group = groupId;

let options = "";

postes.forEach(poste=>{

options += `
<option value="${poste}">
>>> ${poste}
</option>
`;

});

row.innerHTML = `

<td>

<select>
${options}
</select>

</td>

<td>

<input type="number"
class="amount"
value="0"
step="0.01"
oninput="calculateTotals()">

<div class="actions">

<button class="delete"
onclick="deletePoste(this)">
Supprimer
</button>

</div>

</td>

`;

let lastGroupRow = rubriqueRow;

let next = rubriqueRow.nextElementSibling;

while(next){

if(
next.classList.contains("rubrique-2") ||
next.classList.contains("rubrique-principale")
){
break;
}

if(next.dataset.group === groupId){
lastGroupRow = next;
}

next = next.nextElementSibling;

}

lastGroupRow.after(row);

}

/* ======================================================
SUPPRESSION
====================================================== */

function deletePoste(button){

button.closest("tr").remove();

calculateTotals();

}

/* ======================================================
TOTALS
====================================================== */

function calculateTotals(){

let totalActif = 0;
let totalPassif = 0;

document.querySelectorAll("#tableActif .amount")
.forEach(input=>{

totalActif += parseFloat(input.value) || 0;

});

document.querySelectorAll("#tablePassif .amount")
.forEach(input=>{

totalPassif += parseFloat(input.value) || 0;

});

document.getElementById("totalActif")
.innerText = totalActif.toLocaleString('fr-FR',{
minimumFractionDigits:2
});

document.getElementById("totalPassif")
.innerText = totalPassif.toLocaleString('fr-FR',{
minimumFractionDigits:2
});

}

/* ======================================================
VIDER TABLEAU
====================================================== */

function viderChamps(){

document.querySelectorAll(".poste-row")
.forEach(row=>row.remove());

document.getElementById("totalActif")
.innerText = "0,00";

document.getElementById("totalPassif")
.innerText = "0,00";

}

/* ======================================================
ENREGISTRER BILAN
====================================================== */

function enregistrerBilan(){

let nomFichier = prompt(
"Nom du fichier :",
"bilan"
);

if(
nomFichier === null ||
nomFichier.trim() === ""
){
return;
}

let actifClone =
document.getElementById("tableActif").cloneNode(true);

let passifClone =
document.getElementById("tablePassif").cloneNode(true);

/* SUPPRIMER BOUTONS */

actifClone.querySelectorAll("button,.actions")
.forEach(el=>el.remove());

passifClone.querySelectorAll("button,.actions")
.forEach(el=>el.remove());

/* INPUTS -> TEXTE */

actifClone.querySelectorAll("input")
.forEach(input=>{

const td = input.parentElement;

td.innerHTML =
parseFloat(input.value || 0)
.toLocaleString('fr-FR',{
minimumFractionDigits:2
});

});

passifClone.querySelectorAll("input")
.forEach(input=>{

const td = input.parentElement;

td.innerHTML =
parseFloat(input.value || 0)
.toLocaleString('fr-FR',{
minimumFractionDigits:2
});

});

/* SELECTS -> TEXTE */

actifClone.querySelectorAll("select")
.forEach(select=>{

select.parentElement.innerHTML =
select.value;

});

passifClone.querySelectorAll("select")
.forEach(select=>{

select.parentElement.innerHTML =
select.value;

});

/* PAGE HTML */

let contenu = `
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>${nomFichier}</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f6f9;
}

h1{
text-align:center;
margin-bottom:25px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
align-items:stretch;
}

table{
width:100%;
border-collapse:collapse;
background:white;
height:100%;
}

td,th{
border:1px solid #999;
padding:8px;
}

th{
background:#2c3e50;
color:white;
}

.rubrique-principale{
background:#d6eaf8;
font-weight:bold;
}

.rubrique-2{
background:#ebf5fb;
font-weight:bold;
}

.total{
background:#2c3e50;
color:white;
font-weight:bold;
height:60px;
}

</style>

</head>

<body>

<h1>${nomFichier.toUpperCase()}</h1>

<div class="container">

<div>
${actifClone.outerHTML}
</div>

<div>
${passifClone.outerHTML}
</div>

</div>

</body>

</html>
`;

const blob = new Blob(
[contenu],
{
type:"text/html"
}
);

const link = document.createElement("a");

link.href = URL.createObjectURL(blob);

link.download = nomFichier + ".html";

link.click();

}

/* ======================================================
EXPORT EXCEL
====================================================== */

){

/* SUPPRIMER BOUTONS */

actifClone.querySelectorAll("button,.actions")
.forEach(el=>el.remove());

passifClone.querySelectorAll("button,.actions")
.forEach(el=>el.remove());

/* INPUTS -> TEXTE */

actifClone.querySelectorAll("input")
.forEach(input=>{

const td = input.parentElement;

td.innerHTML =
parseFloat(input.value || 0)
.toLocaleString('fr-FR',{
minimumFractionDigits:2
});

});

.forEach(input=>{

const td = input.parentElement;

td.innerHTML =
parseFloat(input.value || 0)

});

/* SELECTS -> TEXTE */

actifClone.querySelectorAll("select")
.forEach(select=>{

select.parentElement.innerHTML =
select.value;

});

passifClone.querySelectorAll("select")
.forEach(select=>{

select.parentElement.innerHTML =
select.value;

/* EXCEL HTML */

let excelHTML = `
<html>

<head>

<meta charset="UTF-8">

<style>

}

</style>

</head>

<body>

<h2 style="text-align:center;">
BILAN
</h2>

<div class="container">

</div>

</div>

`;

const blob = new Blob(
[excelHTML],
{
type:"application/vnd.ms-excel"
}
);

const link = document.createElement("a");

link.href = URL.createObjectURL(blob);

link.download = nomFichier + ".xls";

link.click();

}

/* ======================================================
INITIALISATION
====================================================== */

createTable(actifData, "actifBody");
createTable(passifData, "passifBody");

</script>

</body>
</html>
